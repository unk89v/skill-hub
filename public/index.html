                });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    const notesRes = await fetch(`/api/notes/${skillId}`);
                    notes[skillId] = await notesRes.json();
                    document.getElementById('noteList').innerHTML = renderNotes(notes[skillId]);
                }
            } catch (e) {
                console.error('保存笔记失败:', e);
            }
        }

        async function deleteNote(skillId, noteId) {
            try {
                const res = await fetch(`/api/notes/${skillId}/${noteId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    const notesRes = await fetch(`/api/notes/${skillId}`);
                    notes[skillId] = await notesRes.json();
                    document.getElementById('noteList').innerHTML = renderNotes(notes[skillId]);
                }
            } catch (e) {
                console.error('删除笔记失败:', e);
            }
        }

        // 推荐功能
        async function getRecommendation() {
            const goal = document.getElementById('goalInput').value.trim();
            if (!goal) return;

            const resultContainer = document.getElementById('recommendResult');
            resultContainer.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            `;

            try {
                const res = await fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ goal })
                });
                currentPathData = await res.json();
                renderRecommendation(currentPathData);
            } catch (e) {
                resultContainer.innerHTML = `<div class="empty-state">推荐失败，请重试</div>`;
            }
        }

        function renderRecommendation(data) {
            const container = document.getElementById('recommendResult');
            
            if (data.path.length === 0) {
                container.innerHTML = `
                    <div class="recommend-result">
                        <div class="result-header">
                            <h3>未找到匹配的技能路径</h3>
                            <p>试试描述得更具体一些</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="recommend-result">
                    <div class="result-header">
                        <div>
                            <h3>🎯 ${data.pathTheme || '为你推荐的技能路径'}</h3>
                            <p>预计学习时间：${data.estimatedTotalTime} · 共 ${data.totalSteps} 个技能</p>
                        </div>
                        <div class="export-btns">
                            <button class="export-btn" onclick="exportPath('markdown')">
                                <i class="fas fa-file-alt"></i> Markdown
                            </button>
                            <button class="export-btn" onclick="exportPath('json')">
                                <i class="fas fa-code"></i> JSON
                            </button>
                            <button class="export-btn" onclick="exportPath('txt')">
                                <i class="fas fa-file"></i> TXT
                            </button>
                        </div>
                    </div>
                    
                    <div class="result-path">
                        ${data.path.map(step => `
                            <div class="path-step" onclick="openSkill(${step.skill.id})">
                                <div class="step-number">${step.step}</div>
                                <div style="flex: 1">
                                    <h4>${step.skill.title}</h4>
                                    <p>${step.reason}</p>
                                    <div class="step-meta">
                                        <span>⏱ ${step.estimatedTime}</span>
                                        <span>📊 ${step.difficulty}</span>
                                        <span class="rating">⭐ ${step.avgRating} (${step.ratingCount})</span>
                                        <span>📝 ${step.caseCount} 案例</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="result-suggestions">
                        <h4><i class="fas fa-lightbulb"></i> 学习建议</h4>
                        <ul>
                            ${data.suggestions.map(s => `<li><i class="fas fa-check"></i>${s}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
        }

        async function exportPath(format) {
            if (!currentPathData) return;
            
            try {
                const res = await fetch('/api/export-path', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pathData: currentPathData, format })
                });
                const data = await res.json();
                
                if (data.success) {
                    const blob = new Blob([data.content], { type: data.mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.filename;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            } catch (e) {
                console.error('导出失败:', e);
            }
        }

        // 智能问答
        async function sendQA() {
            const input = document.getElementById('qaInput');
            const question = input.value.trim();
            if (!question) return;
            
            input.value = '';
            
            const chatContainer = document.getElementById('qaChat');
            chatContainer.innerHTML += `
                <div class="qa-message user">${question}</div>
                <div class="qa-message assistant" id="qaLoading">
                    <div class="loading-spinner" style="width:20px;height:20px;border-width:2px;"></div>
                    思考中...
                </div>
            `;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            try {
                const res = await fetch('/api/qa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, history: qaHistory.slice(-4) })
                });
                const data = await res.json();
                
                // 移除加载动画
                document.getElementById('qaLoading')?.remove();
                
                // 显示回答
                let answerHtml = data.answer;
                if (data.relatedSkills && data.relatedSkills.length > 0) {
                    answerHtml += `
                        <div class="qa-related">
                            <div class="qa-related-title">相关技能：</div>
                            <div class="qa-related-skills">
                                ${data.relatedSkills.slice(0, 5).map(s => `
                                    <span class="qa-skill-tag" onclick="openSkill(${s.id})">${s.title}</span>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
                
                chatContainer.innerHTML += `
                    <div class="qa-message assistant">${answerHtml}</div>
                `;
                chatContainer.scrollTop = chatContainer.scrollHeight;
                
                // 保存历史
                qaHistory.push({ question, answer: data.answer });
                
            } catch (e) {
                document.getElementById('qaLoading')?.remove();
                chatContainer.innerHTML += `
                    <div class="qa-message assistant" style="color: #f87171;">
                        网络错误，请稍后重试
                    </div>
                `;
            }
        }

        // 图谱功能
        function initGraphFilter() {
            const filter = document.getElementById('graphFilter');
            filter.innerHTML = '<option value="">全部分类</option>' +
                Object.entries(CATEGORY_CONFIG).map(([id, config]) => 
                    `<option value="${id}">${config.name}</option>`
                ).join('');
        }

        async function loadGraph() {
            try {
                const res = await fetch('/api/graph?limit=100');
                graphData = await res.json();
                renderGraph();
            } catch (e) {
                console.error('加载图谱失败:', e);
            }
        }

        function renderGraph() {
            const svg = d3.select('#graphSvg');
            const container = document.querySelector('.graph-fullscreen');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg.selectAll('*').remove();

            // 更新统计
            document.getElementById('nodeCount').textContent = graphData.nodes.length;
            document.getElementById('linkCount').textContent = graphData.links.length;

            // 放大节点半径，让节点更明显
            const nodes = graphData.nodes.map(n => ({
                ...n,
                radius: Math.max(25, Math.min(45, n.usage / 2000))
            }));

            const links = graphData.links;

            // 添加发光滤镜
            const defs = svg.append('defs');
            
            // 发光效果
            const filter = defs.append('filter')
                .attr('id', 'glow')
                .attr('x', '-50%')
                .attr('y', '-50%')
                .attr('width', '200%')
                .attr('height', '200%');
            
            filter.append('feGaussianBlur')
                .attr('stdDeviation', '4')
                .attr('result', 'coloredBlur');
            
            const feMerge = filter.append('feMerge');
            feMerge.append('feMergeNode').attr('in', 'coloredBlur');
            feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

            // 创建缩放行为
            zoom = d3.zoom()
                .scaleExtent([0.3, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            // 创建主容器
            const g = svg.append('g');

            // 力导向模拟 - 增加节点间距
            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(180))
                .force('charge', d3.forceManyBody().strength(-600))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.radius + 30));

            // 绘制连线 - 使用曲线，更美观
            const link = g.append('g')
                .selectAll('path')
                .data(links)
                .enter().append('path')
                .attr('fill', 'none')
                .attr('stroke', 'rgba(168, 85, 247, 0.25)')
                .attr('stroke-width', 2)
                .attr('class', 'graph-link');

            // 绘制节点组
            const node = g.append('g')
                .selectAll('g')
                .data(nodes)
                .enter().append('g')
                .attr('class', 'graph-node')
                .style('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', dragStarted)
                    .on('drag', dragged)
                    .on('end', dragEnded));

            // 节点背景光晕
            node.append('circle')
                .attr('r', d => d.radius + 8)
                .attr('fill', d => CATEGORY_CONFIG[d.category]?.color || '#64748b')
                .attr('opacity', 0.15)
                .attr('class', 'node-halo');

            // 节点主圆圈
            node.append('circle')
                .attr('r', d => d.radius)
                .attr('fill', d => CATEGORY_CONFIG[d.category]?.color || '#64748b')
                .attr('stroke', '#fff')
                .attr('stroke-width', 3)
                .attr('filter', 'url(#glow)')
                .attr('class', 'node-circle')
                .on('mouseover', function(event, d) {
                    // 放大效果
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr('r', d.radius * 1.2);
                    d3.select(this.parentNode).select('.node-halo')
                        .transition()
                        .duration(200)
                        .attr('r', d.radius * 1.2 + 12)
                        .attr('opacity', 0.25);
                    showTooltip(event, d);
                })
                .on('mouseout', function(event, d) {
                    d3.select(this)
                        .transition()
                        .duration(200)
                        .attr('r', d.radius);
                    d3.select(this.parentNode).select('.node-halo')
                        .transition()
                        .duration(200)
                        .attr('r', d.radius + 8)
                        .attr('opacity', 0.15);
                    hideTooltip();
                })
                .on('click', (event, d) => {
                    switchView('explore');
                    openSkill(d.id);
                });

            // 节点图标（使用首字母）
            node.append('text')
                .attr('class', 'node-icon')
                .attr('dy', '0.35em')
                .attr('text-anchor', 'middle')
                .attr('fill', '#fff')
                .attr('font-size', d => d.radius * 0.7)
                .attr('font-weight', 'bold')
                .attr('pointer-events', 'none')
                .text(d => d.name.charAt(0).toUpperCase());

            // 节点标签（名称）
            node.append('text')
                .attr('class', 'node-label')
                .attr('dy', d => d.radius + 18)
                .attr('text-anchor', 'middle')
                .attr('fill', 'rgba(255,255,255,0.9)')
                .attr('font-size', '12px')
                .attr('font-weight', '500')
                .attr('pointer-events', 'none')
                .text(d => d.name.length > 10 ? d.name.slice(0, 9) + '..' : d.name);

            // 模拟tick
            simulation.on('tick', () => {
                // 曲线连接
                link.attr('d', d => {
                    const dx = d.target.x - d.source.x;
                    const dy = d.target.y - d.source.y;
                    const dr = Math.sqrt(dx * dx + dy * dy) * 1.5;
                    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
                });

                node.attr('transform', d => {
                    d.x = Math.max(d.radius, Math.min(width - d.radius, d.x));
                    d.y = Math.max(d.radius, Math.min(height - d.radius, d.y));
                    return `translate(${d.x},${d.y})`;
                });
            });

            renderGraphLegend();
        }

        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('nodeTooltip');
            const config = CATEGORY_CONFIG[d.category] || { name: '其他' };
            
            tooltip.innerHTML = `
                <h4>${d.name}</h4>
                <p>分类：${config.name}</p>
                <p>热度：${(d.usage / 1000).toFixed(1)}k</p>
                <div class="tooltip-meta">点击查看详情</div>
            `;
            
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
        }

        function hideTooltip() {
            document.getElementById('nodeTooltip').style.display = 'none';
        }

        function renderGraphLegend() {
            const container = document.getElementById('graphLegend');
            const items = Object.entries(CATEGORY_CONFIG).slice(0, 10);
            
            container.innerHTML = `
                <div class="legend-title">分类图例</div>
                ${items.map(([id, config]) => `
                    <div class="legend-item" onclick="filterByCategory('${id}')">
                        <div class="legend-dot" style="background: ${config.color}"></div>
                        <span>${config.name}</span>
                    </div>
                `).join('')}
            `;
        }

        function filterByCategory(categoryId) {
            document.getElementById('graphFilter').value = categoryId;
            filterGraph();
        }

        async function filterGraph() {
            const search = document.getElementById('graphSearchInput').value;
            const category = document.getElementById('graphFilter').value;
            
            try {
                const params = new URLSearchParams({ limit: 100 });
                if (category) params.append('category', category);
                if (search) params.append('search', search);
                
                const res = await fetch(`/api/graph?${params}`);
                graphData = await res.json();
                renderGraph();
            } catch (e) {
                console.error('过滤图谱失败:', e);
            }
        }

        function zoomIn() {
            d3.select('#graphSvg').transition().duration(300).call(zoom.scaleBy, 1.5);
        }

        function zoomOut() {
            d3.select('#graphSvg').transition().duration(300).call(zoom.scaleBy, 0.67);
        }

        function resetZoom() {
            d3.select('#graphSvg').transition().duration(300).call(zoom.transform, d3.zoomIdentity);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDetail();
                document.getElementById('favoritesPanel').classList.remove('open');
            }
        });

        init();
    </script>
</body>
</html>
