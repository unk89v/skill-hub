<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillverse - 技能宇宙</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cosmic-purple: #0a0a1a;
            --nebula-blue: #1a1a3e;
            --star-gold: #ffd700;
            --aurora-pink: #ff6b9d;
            --aurora-blue: #00d4ff;
            --aurora-purple: #a855f7;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--cosmic-purple);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 星空背景 */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 流星 */
        .shooting-star {
            position: fixed;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot 3s ease-out infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)) translateY(300px); opacity: 0; }
        }

        /* 极光效果 */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 0%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
            animation: aurora 15s ease-in-out infinite;
        }

        @keyframes aurora {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.7; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 头部 */
        header {
            padding: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-purple), var(--aurora-blue));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 
                0 0 30px rgba(168, 85, 247, 0.5),
                0 0 60px rgba(168, 85, 247, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.5), 0 0 60px rgba(168, 85, 247, 0.3); }
            50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.7), 0 0 80px rgba(168, 85, 247, 0.4); }
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* 统计条 */
        .stats-bar {
            display: flex;
            gap: 32px;
            padding: 16px 24px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Hero 区域 */
        .hero {
            text-align: center;
            padding: 60px 0 40px;
        }

        .hero h2 {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero h2 span {
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-purple), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        /* 搜索框 */
        .search-container {
            max-width: 700px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 20px 24px 20px 60px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--aurora-purple);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
        }

        .search-box::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .search-icon {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255,255,255,0.3);
        }

        /* 快捷标签 */
        .quick-tags {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .quick-tag {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-tag:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
            transform: translateY(-2px);
        }

        .quick-tag i {
            font-size: 14px;
        }

        /* 分类导航 */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .category-card {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: transparent;
        }

        .category-card:hover::before {
            opacity: 0.15;
        }

        .category-card.active {
            border-color: var(--aurora-purple);
            background: rgba(168, 85, 247, 0.1);
        }

        .category-icon {
            font-size: 32px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .category-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .category-count {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            position: relative;
            z-index: 1;
        }

        /* 热门技能展示 */
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title h3 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title h3 i {
            color: var(--star-gold);
        }

        .view-all {
            font-size: 14px;
            color: var(--aurora-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-all:hover {
            text-decoration: underline;
        }

        /* 技能卡片网格 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .skill-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .skill-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--aurora-purple), transparent 30%);
            opacity: 0;
            animation: none;
            transition: opacity 0.3s;
        }

        .skill-card:hover::before {
            opacity: 0.1;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .skill-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                0 0 40px rgba(168, 85, 247, 0.2);
        }

        .skill-card-content {
            position: relative;
            z-index: 1;
        }

        .skill-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .skill-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: var(--icon-bg);
            box-shadow: 0 8px 24px var(--icon-shadow);
        }

        .skill-badges {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .badge-trending {
            padding: 5px 12px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge-new {
            padding: 5px 12px;
            background: linear-gradient(135deg, var(--aurora-blue), var(--aurora-purple));
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .skill-usage {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .skill-usage i {
            color: var(--star-gold);
        }

        .skill-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .skill-id {
            font-size: 11px;
            font-family: 'Monaco', monospace;
            color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .skill-desc {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .skill-tag {
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            background: var(--tag-bg);
            color: var(--tag-color);
            transition: all 0.2s;
        }

        .skill-tag:hover {
            transform: scale(1.1);
        }

        .skill-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .skill-related {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .skill-related i {
            color: var(--aurora-purple);
        }

        .skill-cta {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .skill-card:hover .skill-cta {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
        }

        /* 关联发现面板 */
        .discovery-panel {
            position: fixed;
            top: 0;
            right: -520px;
            width: 520px;
            height: 100vh;
            background: linear-gradient(180deg, var(--nebula-blue), var(--cosmic-purple));
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
        }

        .discovery-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 32px;
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.1), transparent);
            position: relative;
        }

        .panel-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .panel-close:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg);
        }

        .panel-icon {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            box-shadow: 0 12px 40px rgba(168, 85, 247, 0.4);
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .panel-id {
            font-size: 12px;
            font-family: 'Monaco', monospace;
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .panel-url {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-blue));
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .panel-url:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
        }

        .panel-body {
            padding: 32px;
        }

        .panel-section {
            margin-bottom: 32px;
        }

        .panel-section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .panel-desc {
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255,255,255,0.7);
        }

        .panel-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .panel-stat {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .panel-stat-value {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel-stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .related-skills {
            display: grid;
            gap: 12px;
        }

        .related-skill {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .related-skill:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--aurora-purple);
            transform: translateX(8px);
        }

        .related-skill-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
        }

        .related-skill-info h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .related-skill-info p {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        /* 探索路径 */
        .explore-path {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 48px;
        }

        .path-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .path-header h3 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .path-header h3 i {
            color: var(--aurora-blue);
        }

        .path-steps {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            padding: 10px 0;
        }

        .path-step {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .path-node {
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }

        .path-node:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        .path-node.active {
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-color: transparent;
        }

        .path-arrow {
            padding: 0 12px;
            color: rgba(255,255,255,0.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 0 16px; }
            .hero h2 { font-size: 32px; }
            .skills-grid { grid-template-columns: 1fr; }
            .discovery-panel { width: 100%; right: -100%; }
            .stats-bar { display: none; }
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="starfield" id="starfield"></div>
    <div class="aurora"></div>
    <div class="shooting-star" style="top: 20%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 50%; animation-delay: 2s;"></div>
    <div class="shooting-star" style="top: 70%; animation-delay: 4s;"></div>

    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="logo">
                <div class="logo-icon">🌌</div>
                <div class="logo-text">
                    <h1>Skillverse</h1>
                    <p>技能宇宙 · 发现无限可能</p>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="totalSkills">0</div>
                    <div class="stat-label">技能星球</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalCategories">0</div>
                    <div class="stat-label">技能星系</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalConnections">0</div>
                    <div class="stat-label">星际航道</div>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero">
            <h2>探索 <span>技能宇宙</span></h2>
            <p>每一个技能都是一颗星球，点击探索，发现意想不到的关联与可能</p>
            
            <!-- 搜索 -->
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-box" id="searchInput" 
                       placeholder="搜索技能、场景、目标... 例如：AI对话、自动化工作流、数据分析">
            </div>

            <!-- 快捷标签 -->
            <div class="quick-tags">
                <div class="quick-tag" onclick="quickSearch('ChatGPT')">
                    <i class="fas fa-robot"></i> ChatGPT
                </div>
                <div class="quick-tag" onclick="quickSearch('飞书')">
                    <i class="fas fa-paper-plane"></i> 飞书
                </div>
                <div class="quick-tag" onclick="quickSearch('企业微信')">
                    <i class="fas fa-building"></i> 企业微信
                </div>
                <div class="quick-tag" onclick="quickSearch('自动化')">
                    <i class="fas fa-magic"></i> 自动化
                </div>
                <div class="quick-tag" onclick="quickSearch('翻译')">
                    <i class="fas fa-language"></i> 翻译
                </div>
                <div class="quick-tag" onclick="quickSearch('数据分析')">
                    <i class="fas fa-chart-bar"></i> 数据分析
                </div>
            </div>
        </section>

        <!-- 分类 -->
        <section class="categories" id="categories"></section>

        <!-- 探索路径 -->
        <div class="explore-path">
            <div class="path-header">
                <h3><i class="fas fa-route"></i> 推荐探索路径</h3>
                <span style="color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer;">
                    换一条 <i class="fas fa-sync-alt"></i>
                </span>
            </div>
            <div class="path-steps" id="pathSteps">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 热门技能 -->
        <section>
            <div class="section-title">
                <h3><i class="fas fa-fire"></i> 热门技能星球</h3>
                <div class="view-all">查看全部 <i class="fas fa-arrow-right"></i></div>
            </div>
            <div class="skills-grid" id="skillsGrid"></div>
        </section>
    </div>

    <!-- 发现面板 -->
    <div class="discovery-panel" id="discoveryPanel">
        <div class="panel-header">
            <div class="panel-close" onclick="closePanel()">
                <i class="fas fa-times"></i>
            </div>
            <div class="panel-icon" id="panelIcon">🚀</div>
            <h2 class="panel-title" id="panelTitle">技能名称</h2>
            <span class="panel-id" id="panelId">skill-id</span>
            <a href="#" class="panel-url" id="panelUrl" target="_blank">
                <i class="fas fa-external-link-alt"></i> 访问官网
            </a>
        </div>
        <div class="panel-body" id="panelBody"></div>
    </div>

    <script>
        let allSkills = [];
        let categories = [];
        let currentCategory = null;
        let selectedSkill = null;

        // 分类配置
        const CATEGORY_CONFIG = {
            ai: { name: 'AI 智能', icon: '🧠', gradient: 'linear-gradient(135deg, #667eea, #764ba2)' },
            dev: { name: '开发工具', icon: '💻', gradient: 'linear-gradient(135deg, #3b82f6, #06b6d4)' },
            data: { name: '数据分析', icon: '📊', gradient: 'linear-gradient(135deg, #06b6d4, #10b981)' },
            content: { name: '内容创作', icon: '✍️', gradient: 'linear-gradient(135deg, #10b981, #34d399)' },
            search: { name: '搜索发现', icon: '🔍', gradient: 'linear-gradient(135deg, #f59e0b, #fbbf24)' },
            productivity: { name: '效率提升', icon: '⚡', gradient: 'linear-gradient(135deg, #ec4899, #f472b6)' },
            automation: { name: '自动化', icon: '🤖', gradient: 'linear-gradient(135deg, #6366f1, #818cf8)' },
            marketing: { name: '营销增长', icon: '📢', gradient: 'linear-gradient(135deg, #ef4444, #f87171)' },
            design: { name: '设计创意', icon: '🎨', gradient: 'linear-gradient(135deg, #14b8a6, #2dd4bf)' },
            translation: { name: '翻译助手', icon: '🌐', gradient: 'linear-gradient(135deg, #f97316, #fb923c)' },
            education: { name: '教育学习', icon: '📚', gradient: 'linear-gradient(135deg, #84cc16, #a3e635)' },
            finance: { name: '财务金融', icon: '💰', gradient: 'linear-gradient(135deg, #0ea5e9, #38bdf8)' }
        };

        // 标签颜色
        const TAG_COLORS = {
            'AI': { bg: 'rgba(168, 85, 247, 0.2)', color: '#c084fc' },
            'ChatGPT': { bg: 'rgba(16, 185, 129, 0.2)', color: '#34d399' },
            '搜索': { bg: 'rgba(245, 158, 11, 0.2)', color: '#fbbf24' },
            '飞书': { bg: 'rgba(14, 165, 233, 0.2)', color: '#38bdf8' },
            '企业微信': { bg: 'rgba(34, 197, 94, 0.2)', color: '#4ade80' },
            '微博': { bg: 'rgba(239, 68, 68, 0.2)', color: '#f87171' },
            '自动化': { bg: 'rgba(99, 102, 241, 0.2)', color: '#818cf8' },
            '翻译': { bg: 'rgba(249, 115, 22, 0.2)', color: '#fb923c' },
            '数据': { bg: 'rgba(6, 182, 212, 0.2)', color: '#22d3ee' },
            '营销': { bg: 'rgba(236, 72, 153, 0.2)', color: '#f472b6' }
        };

        // 技能官网
        const SKILL_URLS = {
            'baidu-search': 'https://www.baidu.com',
            'baidu-scholar-search': 'https://xueshu.baidu.com',
            'weibo-hot-search': 'https://s.weibo.com/top/summary',
            'weibo-search': 'https://weibo.com',
            'feishu-doc': 'https://www.feishu.cn',
            'wecom-meeting': 'https://work.weixin.qq.com',
            'chatgpt-api': 'https://platform.openai.com',
            'langchain': 'https://www.langchain.com',
            'clawhub': 'https://clawhub.com'
        };

        // 创建星空
        function createStars() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                starfield.appendChild(star);
            }
        }

        // 初始化
        async function init() {
            createStars();
            
            try {
                const res = await fetch('/api/skills');
                const data = await res.json();
                categories = data.categories;
                allSkills = data.skills;

                const connections = allSkills.reduce((sum, s) => sum + s.related.length, 0);
                document.getElementById('totalSkills').textContent = allSkills.length;
                document.getElementById('totalCategories').textContent = categories.length;
                document.getElementById('totalConnections').textContent = connections;

                renderCategories();
                renderSkills(allSkills);
                renderPath();
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        // 快速搜索
        function quickSearch(query) {
            document.getElementById('searchInput').value = query;
            searchSkills(query);
        }

        // 渲染分类
        function renderCategories() {
            const container = document.getElementById('categories');
            
            let html = `
                <div class="category-card ${!currentCategory ? 'active' : ''}" 
                     onclick="selectCategory(null)"
                     style="--gradient: linear-gradient(135deg, #667eea, #764ba2)">
                    <div class="category-icon">🌌</div>
                    <div class="category-name">全部</div>
                    <div class="category-count">${allSkills.length} 个技能</div>
                </div>
            `;

            categories.slice(0, 11).forEach(cat => {
                const count = allSkills.filter(s => s.category === cat.id).length;
                const config = CATEGORY_CONFIG[cat.id] || { name: cat.name, icon: '⭐', gradient: 'linear-gradient(135deg, #64748b, #94a3b8)' };
                html += `
                    <div class="category-card ${currentCategory === cat.id ? 'active' : ''}" 
                         onclick="selectCategory('${cat.id}')"
                         style="--gradient: ${config.gradient}">
                        <div class="category-icon">${config.icon}</div>
                        <div class="category-name">${config.name}</div>
                        <div class="category-count">${count} 个技能</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 选择分类
        function selectCategory(catId) {
            currentCategory = catId;
            renderCategories();
            const filtered = catId ? allSkills.filter(s => s.category === catId) : allSkills;
            renderSkills(filtered);
        }

        // 搜索
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchSkills(e.target.value);
        });

        function searchSkills(query) {
            if (!query.trim()) {
                const filtered = currentCategory ? allSkills.filter(s => s.category === currentCategory) : allSkills;
                renderSkills(filtered);
                return;
            }

            const q = query.toLowerCase();
            const results = allSkills.filter(skill => {
                return skill.title.toLowerCase().includes(q) ||
                       skill.name.toLowerCase().includes(q) ||
                       skill.desc.toLowerCase().includes(q) ||
                       skill.tags.some(t => t.toLowerCase().includes(q));
            });

            results.sort((a, b) => getRelevanceScore(b, q) - getRelevanceScore(a, q));
            renderSkills(results);
        }

        function getRelevanceScore(skill, query) {
            let score = 0;
            const q = query.toLowerCase();
            if (skill.title.toLowerCase() === q) score += 100;
            else if (skill.title.toLowerCase().includes(q)) score += 50;
            if (skill.name.toLowerCase().includes(q)) score += 40;
            skill.tags.forEach(t => {
                if (t.toLowerCase() === q) score += 30;
                else if (t.toLowerCase().includes(q)) score += 15;
            });
            if (skill.desc.toLowerCase().includes(q)) score += 10;
            return score;
        }

        // 渲染探索路径
        function renderPath() {
            const topSkills = allSkills.sort((a, b) => b.usage - a.usage).slice(0, 5);
            const container = document.getElementById('pathSteps');
            
            container.innerHTML = topSkills.map((skill, i) => `
                <div class="path-step">
                    <div class="path-node ${i === 0 ? 'active' : ''}" onclick="openSkill(${skill.id})">
                        ${i + 1}. ${skill.title}
                    </div>
                    ${i < topSkills.length - 1 ? '<div class="path-arrow">→</div>' : ''}
                </div>
            `).join('');
        }

        // 渲染技能
        function renderSkills(skills) {
            const container = document.getElementById('skillsGrid');

            if (skills.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: rgba(255,255,255,0.4);">
                        <div style="font-size: 64px; margin-bottom: 20px;">🔭</div>
                        <div style="font-size: 20px;">未发现匹配的技能星球</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = skills.slice(0, 12).map(skill => {
                const config = CATEGORY_CONFIG[skill.category] || { icon: '⭐', gradient: 'linear-gradient(135deg, #64748b, #94a3b8)' };
                const isTrending = skill.usage > 50000;
                const isNew = Math.random() > 0.8;
                const url = SKILL_URLS[skill.name];

                return `
                    <div class="skill-card" onclick="openSkill(${skill.id})"
                         style="--icon-bg: ${config.gradient}; --icon-shadow: rgba(168, 85, 247, 0.3)">
                        <div class="skill-card-content">
                            <div class="skill-header">
                                <div class="skill-icon">${config.icon}</div>
                                <div class="skill-badges">
                                    ${isTrending ? '<div class="badge-trending"><i class="fas fa-fire"></i> 热门</div>' : ''}
                                    ${isNew ? '<div class="badge-new">NEW</div>' : ''}
                                    <div class="skill-usage">
                                        <i class="fas fa-star"></i>
                                        ${(skill.usage / 1000).toFixed(1)}k
                                    </div>
                                </div>
                            </div>
                            <h3 class="skill-title">${skill.title}</h3>
                            <span class="skill-id">${skill.name}</span>
                            <p class="skill-desc">${skill.desc}</p>
                            <div class="skill-tags">
                                ${skill.tags.slice(0, 4).map(t => {
                                    const color = TAG_COLORS[t] || { bg: 'rgba(255,255,255,0.05)', color: 'rgba(255,255,255,0.6)' };
                                    return `<span class="skill-tag" style="--tag-bg: ${color.bg}; --tag-color: ${color.color}">${t}</span>`;
                                }).join('')}
                            </div>
                            <div class="skill-footer">
                                <div class="skill-related">
                                    <i class="fas fa-link"></i>
                                    ${skill.related.length} 个关联技能
                                </div>
                                <div class="skill-cta">
                                    探索 <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 打开技能
        function openSkill(id) {
            selectedSkill = allSkills.find(s => s.id === id);
            const config = CATEGORY_CONFIG[selectedSkill.category] || { icon: '⭐' };
            
            document.getElementById('panelIcon').textContent = config.icon;
            document.getElementById('panelTitle').textContent = selectedSkill.title;
            document.getElementById('panelId').textContent = selectedSkill.name;
            
            const url = SKILL_URLS[selectedSkill.name];
            const urlEl = document.getElementById('panelUrl');
            if (url) {
                urlEl.href = url;
                urlEl.style.display = 'inline-flex';
            } else {
                urlEl.style.display = 'none';
            }

            const related = selectedSkill.related
                .map(id => allSkills.find(s => s.id === id))
                .filter(Boolean)
                .slice(0, 6);

            document.getElementById('panelBody').innerHTML = `
                <div class="panel-section">
                    <div class="panel-section-title">简介</div>
                    <p class="panel-desc">${selectedSkill.desc} 这个技能可以帮助你快速实现相关功能，提升工作效率。</p>
                </div>
                
                <div class="panel-section">
                    <div class="panel-section-title">数据</div>
                    <div class="panel-stats">
                        <div class="panel-stat">
                            <div class="panel-stat-value">${(selectedSkill.usage / 1000).toFixed(1)}k</div>
                            <div class="panel-stat-label">使用次数</div>
                        </div>
                        <div class="panel-stat">
                            <div class="panel-stat-value">${selectedSkill.tags.length}</div>
                            <div class="panel-stat-label">标签</div>
                        </div>
                        <div class="panel-stat">
                            <div class="panel-stat-value">${selectedSkill.related.length}</div>
                            <div class="panel-stat-label">关联</div>
                        </div>
                    </div>
                </div>
                
                <div class="panel-section">
                    <div class="panel-section-title">标签</div>
                    <div class="skill-tags">
                        ${selectedSkill.tags.map(t => {
                            const color = TAG_COLORS[t] || { bg: 'rgba(255,255,255,0.05)', color: 'rgba(255,255,255,0.6)' };
                            return `<span class="skill-tag" style="--tag-bg: ${color.bg}; --tag-color: ${color.color}">${t}</span>`;
                        }).join('')}
                    </div>
                </div>
                
                ${related.length > 0 ? `
                <div class="panel-section">
                    <div class="panel-section-title">关联技能星球</div>
                    <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 16px;">
                        点击探索相关技能，发现更多可能 ✨
                    </p>
                    <div class="related-skills">
                        ${related.map(s => {
                            const c = CATEGORY_CONFIG[s.category] || { icon: '⭐' };
                            return `
                                <div class="related-skill" onclick="openSkill(${s.id})">
                                    <div class="related-skill-icon">${c.icon}</div>
                                    <div class="related-skill-info">
                                        <h4>${s.title}</h4>
                                        <p>${s.desc.substring(0, 30)}...</p>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            document.getElementById('discoveryPanel').classList.add('open');
        }

        // 关闭面板
        function closePanel() {
            document.getElementById('discoveryPanel').classList.remove('open');
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanel();
        });

        // 启动
        init();
    </script>
</body>
</html>
