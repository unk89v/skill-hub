<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillverse - 技能宇宙</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cosmic-purple: #0a0a1a;
            --nebula-blue: #1a1a3e;
            --star-gold: #ffd700;
            --aurora-pink: #ff6b9d;
            --aurora-blue: #00d4ff;
            --aurora-purple: #a855f7;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--cosmic-purple);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 星空背景 */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 0%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
            animation: aurora 15s ease-in-out infinite;
        }

        @keyframes aurora {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.7; }
        }

        /* 导航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-purple), var(--aurora-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, white, var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.03);
            padding: 4px;
            border-radius: 10px;
        }

        .nav-tab {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            color: white;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 13px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        .nav-btn .count {
            padding: 2px 8px;
            background: var(--aurora-purple);
            border-radius: 10px;
            font-size: 11px;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            padding-top: 72px;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* 探索视图 */
        #exploreView {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .hero {
            text-align: center;
            padding: 40px 0 32px;
        }

        .hero h2 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .hero h2 span {
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-purple), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            max-width: 600px;
            margin: 0 auto 24px;
        }

        .search-container {
            max-width: 700px;
            margin: 0 auto 32px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 18px 24px 18px 56px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--aurora-purple);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.15);
        }

        .search-box::placeholder { color: rgba(255,255,255,0.3); }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: rgba(255,255,255,0.3);
        }

        .quick-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .quick-tag {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-tag:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        /* 分类 */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .category-card {
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-card:hover {
            transform: translateY(-4px);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .category-card.active {
            background: rgba(168, 85, 247, 0.15);
            border-color: var(--aurora-purple);
        }

        .category-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .category-name {
            font-size: 12px;
            font-weight: 600;
        }

        .category-count {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* 探索路径 */
        .explore-path {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .path-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .path-header h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .path-header h3 i { color: var(--aurora-blue); }

        .path-refresh {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
        }

        .path-refresh:hover { color: white; }

        .path-steps {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            padding: 8px 0;
        }

        .path-node {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .path-node:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        .path-node.active {
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-color: transparent;
        }

        .path-arrow {
            padding: 0 8px;
            color: rgba(255,255,255,0.2);
        }

        /* 技能网格 */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .skill-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .skill-card:hover {
            transform: translateY(-8px);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 32px rgba(168, 85, 247, 0.15);
        }

        .skill-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .skill-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }

        .skill-badges {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .badge-hot {
            padding: 4px 10px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
        }

        .skill-usage {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .skill-usage i { color: var(--star-gold); }

        .skill-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .skill-id {
            font-size: 10px;
            font-family: Monaco, monospace;
            color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            padding: 3px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .skill-desc {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.6);
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .skill-tag {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .skill-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .skill-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .skill-rating .stars {
            color: var(--star-gold);
        }

        .skill-cta {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ==================== 全屏图谱视图 ==================== */
        
        #graphView {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding-top: 72px;
            background: var(--cosmic-purple);
        }

        .graph-fullscreen {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #graphSvg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graphSvg:active {
            cursor: grabbing;
        }

        .graph-top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .graph-search-box {
            width: 400px;
            padding: 14px 20px 14px 48px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 14px;
            color: white;
            backdrop-filter: blur(10px);
        }

        .graph-search-box:focus {
            outline: none;
            border-color: var(--aurora-purple);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        .graph-search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 16px;
        }

        .graph-filter {
            padding: 14px 20px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 14px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .graph-controls {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .graph-btn {
            width: 48px;
            height: 48px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .graph-btn:hover {
            border-color: var(--aurora-purple);
            color: white;
            background: rgba(168, 85, 247, 0.2);
        }

        .graph-btn.active {
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-color: transparent;
        }

        .graph-legend {
            position: absolute;
            top: 100px;
            right: 30px;
            background: rgba(26, 26, 46, 0.95);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            backdrop-filter: blur(10px);
            max-width: 200px;
        }

        .legend-title {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .legend-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .graph-stats {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(26, 26, 46, 0.95);
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            backdrop-filter: blur(10px);
            font-size: 12px;
        }

        .graph-stats-row {
            display: flex;
            gap: 20px;
        }

        .graph-stat {
            text-align: center;
        }

        .graph-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--aurora-blue);
        }

        .graph-stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        /* 图谱节点样式 */
        .node-label {
            font-size: 11px;
            fill: rgba(255,255,255,0.8);
            text-anchor: middle;
            pointer-events: none;
            font-weight: 500;
        }

        /* 图谱节点动画 */
        .graph-node {
            transition: transform 0.1s ease-out;
        }

        .node-circle {
            transition: r 0.2s ease-out, filter 0.2s ease-out;
        }

        .node-halo {
            transition: r 0.2s ease-out, opacity 0.2s ease-out;
        }

        .graph-link {
            transition: stroke 0.2s ease-out, stroke-width 0.2s ease-out;
        }

        .graph-link:hover {
            stroke: rgba(168, 85, 247, 0.5);
            stroke-width: 3;
        }

        /* 推荐视图 */
        .recommend-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .recommend-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .recommend-input h3 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recommend-input h3 i { color: var(--aurora-blue); }

        .recommend-textarea {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            color: white;
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .recommend-textarea:focus {
            outline: none;
            border-color: var(--aurora-purple);
        }

        .recommend-textarea::placeholder { color: rgba(255,255,255,0.3); }

        .recommend-btn {
            margin-top: 16px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .recommend-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
        }

        .recommend-result {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 24px;
        }

        .result-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .result-header h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .result-header p {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        .export-btns {
            display: flex;
            gap: 8px;
        }

        .export-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        .result-path {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .path-step {
            display: flex;
            gap: 16px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .path-step:hover {
            border-color: var(--aurora-purple);
            transform: translateX(8px);
        }

        .step-number {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-info {
            flex: 1;
        }

        .step-info h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .step-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .step-meta {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .step-meta span {
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .step-meta .rating {
            color: var(--star-gold);
        }

        .step-time {
            margin-left: auto;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }

        .result-suggestions {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
        }

        .result-suggestions h4 {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-suggestions h4 i { color: var(--aurora-blue); }

        .result-suggestions ul {
            list-style: none;
        }

        .result-suggestions li {
            padding: 8px 0;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .result-suggestions li i {
            color: var(--aurora-blue);
            margin-top: 3px;
        }

        /* 智能问答区域 */
        .qa-section {
            margin-top: 24px;
            background: rgba(168, 85, 247, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
            padding: 20px;
        }

        .qa-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .qa-header h4 {
            font-size: 15px;
        }

        .qa-header .ai-badge {
            padding: 4px 10px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .qa-chat {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .qa-message {
            margin-bottom: 16px;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.7;
        }

        .qa-message.user {
            background: rgba(0, 212, 255, 0.1);
            margin-left: 40px;
        }

        .qa-message.assistant {
            background: rgba(168, 85, 247, 0.1);
            margin-right: 40px;
        }

        .qa-input-row {
            display: flex;
            gap: 10px;
        }

        .qa-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 14px;
            color: white;
            font-family: inherit;
        }

        .qa-input:focus {
            outline: none;
            border-color: var(--aurora-purple);
        }

        .qa-send-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .qa-send-btn:hover {
            transform: scale(1.05);
        }

        .qa-related {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .qa-related-title {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .qa-related-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .qa-skill-tag {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .qa-skill-tag:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        /* 详情面板 */
        .detail-panel {
            position: fixed;
            top: 0;
            right: -550px;
            width: 550px;
            height: 100vh;
            background: linear-gradient(180deg, var(--nebula-blue), var(--cosmic-purple));
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
        }

        .detail-panel.open { right: 0; }

        .panel-header {
            padding: 28px;
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.1), transparent);
            position: relative;
        }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel-close:hover {
            background: rgba(255,255,255,0.1);
            transform: rotate(90deg);
        }

        .panel-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            box-shadow: 0 12px 32px rgba(168, 85, 247, 0.4);
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .panel-id {
            font-size: 11px;
            font-family: Monaco, monospace;
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .panel-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .panel-btn {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .panel-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--aurora-purple);
        }

        .panel-btn.primary {
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border-color: transparent;
        }

        .panel-btn.favorited {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--star-gold);
            color: var(--star-gold);
        }

        .panel-body { padding: 28px; }

        .panel-section {
            margin-bottom: 28px;
        }

        .panel-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .panel-desc {
            font-size: 14px;
            line-height: 1.8;
            color: rgba(255,255,255,0.7);
        }

        .panel-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .panel-stat {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }

        .panel-stat:hover {
            border-color: var(--aurora-purple);
        }

        .panel-stat-value {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--aurora-pink), var(--aurora-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .panel-stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        /* 评分区域 */
        .rating-section {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 20px;
        }

        .rating-display {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .rating-score {
            font-size: 48px;
            font-weight: 900;
            color: var(--star-gold);
        }

        .rating-stars {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .rating-stars .stars {
            font-size: 20px;
            color: var(--star-gold);
        }

        .rating-count {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .rating-input {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .rating-input label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .star-rating {
            display: flex;
            gap: 4px;
        }

        .star-rating .star {
            font-size: 24px;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .star-rating .star:hover,
        .star-rating .star.active {
            color: var(--star-gold);
            transform: scale(1.1);
        }

        .review-input {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 13px;
            color: white;
            min-height: 60px;
            resize: vertical;
            font-family: inherit;
        }

        .review-input:focus {
            outline: none;
            border-color: var(--aurora-purple);
        }

        .submit-rating-btn {
            margin-top: 12px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        /* 案例区域 */
        .cases-section {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 16px;
        }

        .case-form {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .case-form input,
        .case-form textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 13px;
            color: white;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .case-form textarea {
            min-height: 80px;
            resize: vertical;
        }

        .case-form input:focus,
        .case-form textarea:focus {
            outline: none;
            border-color: var(--aurora-purple);
        }

        .case-submit-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--aurora-blue), var(--aurora-purple));
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .case-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .case-item {
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .case-title {
            font-size: 14px;
            font-weight: 600;
        }

        .case-like {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }

        .case-like.liked {
            color: var(--aurora-pink);
        }

        .case-content {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }

        .case-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        /* 笔记 */
        .notes-section {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 16px;
        }

        .note-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 13px;
            color: white;
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .note-input:focus {
            outline: none;
            border-color: var(--aurora-purple);
        }

        .note-save-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .note-list {
            margin-top: 16px;
        }

        .note-item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 8px;
            position: relative;
        }

        .note-content {
            font-size: 13px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }

        .note-time {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 8px;
        }

        .note-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            color: #f87171;
        }

        /* 关联技能 */
        .related-skills {
            display: grid;
            gap: 10px;
        }

        .related-skill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .related-skill:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--aurora-purple);
            transform: translateX(6px);
        }

        .related-skill-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: linear-gradient(135deg, var(--aurora-purple), var(--aurora-pink));
        }

        .related-skill-info h4 {
            font-size: 14px;
            margin-bottom: 2px;
        }

        .related-skill-info p {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        /* 收藏面板 */
        .favorites-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: linear-gradient(180deg, var(--nebula-blue), var(--cosmic-purple));
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 1001;
            transition: right 0.4s;
            overflow-y: auto;
        }

        .favorites-panel.open { right: 0; }

        .favorites-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .favorites-header h2 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .favorites-header h2 i { color: var(--star-gold); }

        .favorites-body {
            padding: 20px;
        }

        .favorite-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .favorite-item:hover {
            border-color: var(--aurora-purple);
        }

        .favorite-icon {
            font-size: 24px;
        }

        .favorite-info {
            flex: 1;
        }

        .favorite-title {
            font-size: 14px;
            font-weight: 600;
        }

        .favorite-category {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .favorite-remove {
            width: 28px;
            height: 28px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #f87171;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.4);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-container { padding: 16px; }
            .hero h2 { font-size: 28px; }
            .skills-grid { grid-template-columns: 1fr; }
            .detail-panel, .favorites-panel { width: 100%; right: -100%; }
            .nav-tabs { display: none; }
            .graph-top-bar { flex-direction: column; width: 90%; }
            .graph-search-box { width: 100%; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--aurora-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 节点 tooltip */
        .node-tooltip {
            position: absolute;
            padding: 12px 16px;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            max-width: 250px;
        }

        .node-tooltip h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .node-tooltip p {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }

        .node-tooltip .tooltip-meta {
            margin-top: 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="aurora"></div>

    <nav class="navbar">
        <div class="logo">
            <div class="logo-icon">🌌</div>
            <div class="logo-text">
                <h1>Skillverse</h1>
            </div>
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" data-view="explore" onclick="switchView('explore')">
                <i class="fas fa-compass"></i> 探索
            </div>
            <div class="nav-tab" data-view="graph" onclick="switchView('graph')">
                <i class="fas fa-project-diagram"></i> 图谱
            </div>
            <div class="nav-tab" data-view="recommend" onclick="switchView('recommend')">
                <i class="fas fa-magic"></i> 推荐
            </div>
        </div>
        <div class="nav-actions">
            <div class="nav-btn" onclick="toggleFavorites()">
                <i class="fas fa-star"></i> 收藏
                <span class="count" id="favCount">0</span>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 探索视图 -->
        <div class="view active" id="exploreView">
            <div class="hero">
                <h2>探索 <span>技能宇宙</span></h2>
                <p>每个技能都是一颗星球，点击探索发现意想不到的关联</p>
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-box" id="searchInput" placeholder="搜索技能、场景、目标...">
                </div>
                <div class="quick-tags">
                    <div class="quick-tag" onclick="quickSearch('ChatGPT')">🤖 ChatGPT</div>
                    <div class="quick-tag" onclick="quickSearch('飞书')">📄 飞书</div>
                    <div class="quick-tag" onclick="quickSearch('自动化')">⚡ 自动化</div>
                    <div class="quick-tag" onclick="quickSearch('翻译')">🌐 翻译</div>
                    <div class="quick-tag" onclick="quickSearch('数据分析')">📊 数据分析</div>
                </div>
            </div>

            <div class="categories" id="categories"></div>

            <div class="explore-path">
                <div class="path-header">
                    <h3><i class="fas fa-route"></i> 推荐探索路径</h3>
                    <div class="path-refresh" onclick="refreshPath()">
                        <i class="fas fa-sync-alt"></i> 换一条
                    </div>
                </div>
                <div class="path-steps" id="pathSteps"></div>
            </div>

            <div class="skills-grid" id="skillsGrid"></div>
        </div>

        <!-- 图谱视图 - 全屏 -->
        <div class="view" id="graphView">
            <div class="graph-fullscreen">
                <div class="graph-top-bar">
                    <div style="position: relative;">
                        <i class="fas fa-search graph-search-icon"></i>
                        <input type="text" class="graph-search-box" id="graphSearchInput" 
                               placeholder="搜索技能..." oninput="filterGraph()">
                    </div>
                    <select class="graph-filter" id="graphFilter" onchange="filterGraph()">
                        <option value="">全部分类</option>
                    </select>
                </div>
                <svg id="graphSvg"></svg>
                <div class="graph-controls">
                    <div class="graph-btn" onclick="zoomIn()" title="放大"><i class="fas fa-plus"></i></div>
                    <div class="graph-btn" onclick="zoomOut()" title="缩小"><i class="fas fa-minus"></i></div>
                    <div class="graph-btn" onclick="resetZoom()" title="重置"><i class="fas fa-expand"></i></div>
                    <div class="graph-btn" onclick="toggleFullscreen()" title="全屏"><i class="fas fa-arrows-alt"></i></div>
                </div>
                <div class="graph-legend" id="graphLegend"></div>
                <div class="graph-stats" id="graphStats">
                    <div class="graph-stats-row">
                        <div class="graph-stat">
                            <div class="graph-stat-value" id="nodeCount">0</div>
                            <div class="graph-stat-label">技能节点</div>
                        </div>
                        <div class="graph-stat">
                            <div class="graph-stat-value" id="linkCount">0</div>
                            <div class="graph-stat-label">关联连线</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 推荐视图 -->
        <div class="view" id="recommendView">
            <div class="recommend-container">
                <div class="recommend-input">
                    <h3><i class="fas fa-lightbulb"></i> 告诉我你想实现什么</h3>
                    <textarea class="recommend-textarea" id="goalInput" 
                              placeholder="例如：我想搭建一个AI客服系统，可以自动回答用户问题..."></textarea>
                    <button class="recommend-btn" onclick="getRecommendation()">
                        <i class="fas fa-magic"></i> 生成技能路径
                    </button>
                </div>
                <div id="recommendResult"></div>

                <!-- 智能问答区域 -->
                <div class="qa-section">
                    <div class="qa-header">
                        <h4><i class="fas fa-robot"></i> 智能问答</h4>
                        <span class="ai-badge">讯飞星辰 AI</span>
                    </div>
                    <div class="qa-chat" id="qaChat"></div>
                    <div class="qa-input-row">
                        <input type="text" class="qa-input" id="qaInput" 
                               placeholder="问我任何关于技能的问题..." 
                               onkeypress="if(event.key==='Enter')sendQA()">
                        <button class="qa-send-btn" onclick="sendQA()">
                            <i class="fas fa-paper-plane"></i> 发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情面板 -->
    <div class="detail-panel" id="detailPanel">
        <div class="panel-header">
            <div class="panel-close" onclick="closeDetail()"><i class="fas fa-times"></i></div>
            <div class="panel-icon" id="panelIcon">🚀</div>
            <h2 class="panel-title" id="panelTitle">技能名称</h2>
            <span class="panel-id" id="panelId">skill-id</span>
            <div class="panel-actions" id="panelActions"></div>
        </div>
        <div class="panel-body" id="panelBody"></div>
    </div>

    <!-- 收藏面板 -->
    <div class="favorites-panel" id="favoritesPanel">
        <div class="favorites-header">
            <h2><i class="fas fa-star"></i> 我的收藏</h2>
            <div class="panel-close" onclick="toggleFavorites()" style="top: 20px; right: 20px;">
                <i class="fas fa-times"></i>
            </div>
        </div>
        <div class="favorites-body" id="favoritesBody"></div>
    </div>

    <!-- 节点 Tooltip -->
    <div class="node-tooltip" id="nodeTooltip" style="display: none;"></div>

    <script>
        let allSkills = [];
        let categories = [];
        let currentCategory = null;
        let selectedSkill = null;
        let favorites = [];
        let notes = {};
        let userRatings = {};
        let graphData = null;
        let simulation = null;
        let currentPathData = null;
        let qaHistory = [];
        let zoom = null;

        const userId = 'user_' + Date.now();

        const CATEGORY_CONFIG = {
            ai: { name: 'AI 智能', icon: '🧠', color: '#a855f7' },
            dev: { name: '开发工具', icon: '💻', color: '#3b82f6' },
            data: { name: '数据分析', icon: '📊', color: '#06b6d4' },
            content: { name: '内容创作', icon: '✍️', color: '#10b981' },
            search: { name: '搜索发现', icon: '🔍', color: '#f59e0b' },
            productivity: { name: '效率提升', icon: '⚡', color: '#ec4899' },
            automation: { name: '自动化', icon: '🤖', color: '#6366f1' },
            marketing: { name: '营销增长', icon: '📢', color: '#ef4444' },
            design: { name: '设计创意', icon: '🎨', color: '#14b8a6' },
            translation: { name: '翻译助手', icon: '🌐', color: '#f97316' },
            education: { name: '教育学习', icon: '📚', color: '#84cc16' },
            finance: { name: '财务金融', icon: '💰', color: '#0ea5e9' }
        };

        const TAG_COLORS = {
            'AI': { bg: 'rgba(168, 85, 247, 0.2)', color: '#c084fc' },
            'ChatGPT': { bg: 'rgba(16, 185, 129, 0.2)', color: '#34d399' },
            '搜索': { bg: 'rgba(245, 158, 11, 0.2)', color: '#fbbf24' },
            '飞书': { bg: 'rgba(14, 165, 233, 0.2)', color: '#38bdf8' },
            '企业微信': { bg: 'rgba(34, 197, 94, 0.2)', color: '#4ade80' },
            '微博': { bg: 'rgba(239, 68, 68, 0.2)', color: '#f87171' },
            '自动化': { bg: 'rgba(99, 102, 241, 0.2)', color: '#818cf8' },
            '翻译': { bg: 'rgba(249, 115, 22, 0.2)', color: '#fb923c' },
            '数据': { bg: 'rgba(6, 182, 212, 0.2)', color: '#22d3ee' },
            '营销': { bg: 'rgba(236, 72, 153, 0.2)', color: '#f472b6' }
        };

        const SKILL_URLS = {
            'baidu-search': 'https://www.baidu.com',
            'weibo-hot-search': 'https://s.weibo.com/top/summary',
            'feishu-doc': 'https://www.feishu.cn',
            'wecom-meeting': 'https://work.weixin.qq.com',
            'chatgpt-api': 'https://platform.openai.com',
            'langchain': 'https://www.langchain.com',
            'clawhub': 'https://clawhub.com'
        };

        function createStars() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                starfield.appendChild(star);
            }
        }

        async function init() {
            createStars();
            
            try {
                const res = await fetch('/api/skills');
                const data = await res.json();
                categories = data.categories;
                allSkills = data.skills;

                renderCategories();
                renderSkills(allSkills);
                renderPath();
                loadFavoritesFromStorage();
                initGraphFilter();
            } catch (e) {
                console.error('加载失败:', e);
            }
        }

        function switchView(view) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.view === view);
            });
            document.querySelectorAll('.view').forEach(v => {
                v.classList.toggle('active', v.id === view + 'View');
            });

            if (view === 'graph') {
                setTimeout(loadGraph, 100);
            }
        }

        function quickSearch(query) {
            document.getElementById('searchInput').value = query;
            searchSkills(query);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchSkills(e.target.value);
        });

        function searchSkills(query) {
            if (!query.trim()) {
                const filtered = currentCategory ? allSkills.filter(s => s.category === currentCategory) : allSkills;
                renderSkills(filtered);
                return;
            }

            const q = query.toLowerCase();
            const results = allSkills.filter(skill => {
                return skill.title.toLowerCase().includes(q) ||
                       skill.name.toLowerCase().includes(q) ||
                       skill.desc.toLowerCase().includes(q) ||
                       skill.tags.some(t => t.toLowerCase().includes(q));
            });

            results.sort((a, b) => getRelevanceScore(b, q) - getRelevanceScore(a, q));
            renderSkills(results);
        }

        function getRelevanceScore(skill, query) {
            let score = 0;
            const q = query.toLowerCase();
            if (skill.title.toLowerCase() === q) score += 100;
            else if (skill.title.toLowerCase().includes(q)) score += 50;
            if (skill.name.toLowerCase().includes(q)) score += 40;
            skill.tags.forEach(t => {
                if (t.toLowerCase() === q) score += 30;
                else if (t.toLowerCase().includes(q)) score += 15;
            });
            if (skill.desc.toLowerCase().includes(q)) score += 10;
            return score;
        }

        function renderCategories() {
            const container = document.getElementById('categories');
            
            let html = `
                <div class="category-card ${!currentCategory ? 'active' : ''}" onclick="selectCategory(null)">
                    <div class="category-icon">🌌</div>
                    <div class="category-name">全部</div>
                    <div class="category-count">${allSkills.length}</div>
                </div>
            `;

            categories.slice(0, 11).forEach(cat => {
                const count = allSkills.filter(s => s.category === cat.id).length;
                const config = CATEGORY_CONFIG[cat.id] || { name: cat.name, icon: '⭐' };
                html += `
                    <div class="category-card ${currentCategory === cat.id ? 'active' : ''}" 
                         onclick="selectCategory('${cat.id}')">
                        <div class="category-icon">${config.icon}</div>
                        <div class="category-name">${config.name}</div>
                        <div class="category-count">${count}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function selectCategory(catId) {
            currentCategory = catId;
            renderCategories();
            const filtered = catId ? allSkills.filter(s => s.category === catId) : allSkills;
            renderSkills(filtered);
        }

        function renderPath() {
            const topSkills = allSkills.sort((a, b) => b.usage - a.usage).slice(0, 5);
            const container = document.getElementById('pathSteps');
            
            container.innerHTML = topSkills.map((skill, i) => `
                <div class="path-node ${i === 0 ? 'active' : ''}" onclick="openSkill(${skill.id})">
                    ${i + 1}. ${skill.title}
                </div>
                ${i < topSkills.length - 1 ? '<div class="path-arrow">→</div>' : ''}
            `).join('');
        }

        function refreshPath() {
            const randomSkills = allSkills.sort(() => Math.random() - 0.5).slice(0, 5);
            const container = document.getElementById('pathSteps');
            container.innerHTML = randomSkills.map((skill, i) => `
                <div class="path-node ${i === 0 ? 'active' : ''}" onclick="openSkill(${skill.id})">
                    ${i + 1}. ${skill.title}
                </div>
                ${i < randomSkills.length - 1 ? '<div class="path-arrow">→</div>' : ''}
            `).join('');
        }

        async function renderSkills(skills) {
            const container = document.getElementById('skillsGrid');

            if (skills.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-search"></i>
                        <div>未发现匹配的技能星球</div>
                    </div>
                `;
                return;
            }

            const ratingsPromises = skills.slice(0, 12).map(skill => 
                fetch(`/api/ratings/${skill.id}`).then(r => r.json()).catch(() => ({ avgRating: 0, count: 0 }))
            );
            
            const ratingsData = await Promise.all(ratingsPromises);

            container.innerHTML = skills.slice(0, 12).map((skill, idx) => {
                const config = CATEGORY_CONFIG[skill.category] || { icon: '⭐' };
                const isHot = skill.usage > 50000;
                const isFav = favorites.includes(skill.id);
                const rating = ratingsData[idx];
                const avgRating = rating.avgRating || 0;
                const ratingCount = rating.count || 0;

                return `
                    <div class="skill-card" onclick="openSkill(${skill.id})">
                        <div class="skill-header">
                            <div class="skill-icon">${config.icon}</div>
                            <div class="skill-badges">
                                ${isHot ? '<div class="badge-hot">🔥 热门</div>' : ''}
                                ${isFav ? '<div style="color: #ffd700;"><i class="fas fa-star"></i></div>' : ''}
                                <div class="skill-usage"><i class="fas fa-star"></i> ${(skill.usage / 1000).toFixed(1)}k</div>
                            </div>
                        </div>
                        <h3 class="skill-title">${skill.title}</h3>
                        <span class="skill-id">${skill.name}</span>
                        <p class="skill-desc">${skill.desc}</p>
                        <div class="skill-tags">
                            ${skill.tags.slice(0, 4).map(t => {
                                const color = TAG_COLORS[t] || { bg: 'rgba(255,255,255,0.05)', color: 'rgba(255,255,255,0.6)' };
                                return `<span class="skill-tag" style="--tag-bg: ${color.bg}; --tag-color: ${color.color}">${t}</span>`;
                            }).join('')}
                        </div>
                        <div class="skill-footer">
                            <div class="skill-rating">
                                <span class="stars">${'★'.repeat(Math.round(avgRating))}${'☆'.repeat(5 - Math.round(avgRating))}</span>
                                <span>${avgRating} (${ratingCount})</span>
                            </div>
                            <div class="skill-cta">探索 <i class="fas fa-arrow-right"></i></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openSkill(id) {
            selectedSkill = allSkills.find(s => s.id === id);
            const config = CATEGORY_CONFIG[selectedSkill.category] || { icon: '⭐' };
            const isFav = favorites.includes(id);
            const url = SKILL_URLS[selectedSkill.name];
            
            document.getElementById('panelIcon').textContent = config.icon;
            document.getElementById('panelTitle').textContent = selectedSkill.title;
            document.getElementById('panelId').textContent = selectedSkill.name;

            document.getElementById('panelActions').innerHTML = `
                <button class="panel-btn ${isFav ? 'favorited' : ''}" onclick="toggleFavorite(${id})">
                    <i class="fas fa-star"></i> ${isFav ? '已收藏' : '收藏'}
                </button>
                ${url ? `<a href="${url}" target="_blank" class="panel-btn primary"><i class="fas fa-external-link-alt"></i> 官网</a>` : ''}
            `;

            await loadSkillDetail(id);
            document.getElementById('detailPanel').classList.add('open');
        }

        async function loadSkillDetail(id) {
            const panelBody = document.getElementById('panelBody');
            
            const ratingsRes = await fetch(`/api/ratings/${id}`);
            const ratingsData = await ratingsRes.json();
            
            const casesRes = await fetch(`/api/cases/${id}`);
            const casesData = await casesRes.json();
            
            const notesRes = await fetch(`/api/notes/${id}`);
            const notesData = await notesRes.json();
            notes[id] = notesData;

            const config = CATEGORY_CONFIG[selectedSkill.category] || { icon: '⭐', name: '其他' };
            const related = selectedSkill.related
                .map(id => allSkills.find(s => s.id === id))
                .filter(Boolean)
                .slice(0, 6);

            const userRating = userRatings[id] || 0;
            const userReview = ratingsData.ratings?.find(r => r.userId === userId)?.review || '';

            panelBody.innerHTML = `
                <div class="panel-section">
                    <div class="panel-section-title">简介</div>
                    <p class="panel-desc">${selectedSkill.desc}</p>
                </div>
                
                <div class="panel-section">
                    <div class="panel-section-title">数据</div>
                    <div class="panel-stats">
                        <div class="panel-stat" onclick="scrollToRating()">
                            <div class="panel-stat-value">${ratingsData.avgRating || 0}</div>
                            <div class="panel-stat-label">评分 (${ratingsData.count || 0}人)</div>
                        </div>
                        <div class="panel-stat" onclick="scrollToCases()">
                            <div class="panel-stat-value">${casesData.length || 0}</div>
                            <div class="panel-stat-label">使用案例</div>
                        </div>
                        <div class="panel-stat">
                            <div class="panel-stat-value">${selectedSkill.related.length}</div>
                            <div class="panel-stat-label">关联技能</div>
                        </div>
                    </div>
                </div>
                
                <div class="panel-section" id="ratingSection">
                    <div class="panel-section-title">评分评价</div>
                    <div class="rating-section">
                        <div class="rating-display">
                            <div class="rating-score">${ratingsData.avgRating || '0.0'}</div>
                            <div class="rating-stars">
                                <div class="stars">${'★'.repeat(Math.round(ratingsData.avgRating || 0))}${'☆'.repeat(5 - Math.round(ratingsData.avgRating || 0))}</div>
                                <div class="rating-count">${ratingsData.count || 0} 人评价</div>
                            </div>
                        </div>
                        <div class="rating-input">
                            <label>我的评分：</label>
                            <div class="star-rating" id="starRating">
                                ${[1,2,3,4,5].map(i => `
                                    <span class="star ${userRating >= i ? 'active' : ''}" 
                                          onclick="setRating(${id}, ${i})">★</span>
                                `).join('')}
                            </div>
                        </div>
                        <textarea class="review-input" id="reviewInput" placeholder="分享你的使用体验（可选）...">${userReview}</textarea>
                        <button class="submit-rating-btn" onclick="submitRating(${id})">提交评价</button>
                    </div>
                </div>
                
                <div class="panel-section" id="casesSection">
                    <div class="panel-section-title">使用案例</div>
                    <div class="cases-section">
                        <div class="case-form">
                            <input type="text" id="caseTitle" placeholder="案例标题">
                            <textarea id="caseContent" placeholder="描述你如何使用这个技能..."></textarea>
                            <button class="case-submit-btn" onclick="submitCase(${id})">分享案例</button>
                        </div>
                        <div class="case-list" id="caseList">
                            ${renderCases(casesData)}
                        </div>
                    </div>
                </div>
                
                <div class="panel-section">
                    <div class="panel-section-title">我的笔记</div>
                    <div class="notes-section">
                        <textarea class="note-input" id="noteInput" placeholder="记录你的想法、使用心得..."></textarea>
                        <button class="note-save-btn" onclick="saveNote(${id})">保存笔记</button>
                        <div class="note-list" id="noteList">
                            ${renderNotes(notes[id] || [])}
                        </div>
                    </div>
                </div>
                
                ${related.length > 0 ? `
                <div class="panel-section">
                    <div class="panel-section-title">关联技能</div>
                    <div class="related-skills">
                        ${related.map(s => {
                            const c = CATEGORY_CONFIG[s.category] || { icon: '⭐' };
                            return `
                                <div class="related-skill" onclick="openSkill(${s.id})">
                                    <div class="related-skill-icon">${c.icon}</div>
                                    <div class="related-skill-info">
                                        <h4>${s.title}</h4>
                                        <p>${s.desc.substring(0, 25)}...</p>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                ` : ''}
            `;
        }

        function renderCases(cases) {
            if (!cases || cases.length === 0) {
                return '<div class="empty-state" style="padding: 20px; font-size: 12px;">暂无案例，快来分享你的使用经验吧</div>';
            }
            
            return cases.slice(0, 5).map(c => {
                const hasLiked = c.likedBy?.includes(userId);
                return `
                    <div class="case-item">
                        <div class="case-header">
                            <div class="case-title">${c.title}</div>
                            <div class="case-like ${hasLiked ? 'liked' : ''}" onclick="likeCase(${c.skillId}, ${c.id})">
                                <i class="fas fa-heart"></i> ${c.likes || 0}
                            </div>
                        </div>
                        <div class="case-content">${c.content}</div>
                        <div class="case-meta">
                            <span>${c.userName}</span>
                            <span>${new Date(c.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderNotes(notesList) {
            if (!notesList || notesList.length === 0) return '';
            
            return notesList.map(note => `
                <div class="note-item">
                    <div class="note-content">${note.content}</div>
                    <div class="note-time">${new Date(note.createdAt).toLocaleString()}</div>
                    <div class="note-delete" onclick="deleteNote(${selectedSkill.id}, ${note.id})">
                        <i class="fas fa-trash"></i>
                    </div>
                </div>
            `).join('');
        }

        function scrollToRating() {
            document.getElementById('ratingSection')?.scrollIntoView({ behavior: 'smooth' });
        }

        function scrollToCases() {
            document.getElementById('casesSection')?.scrollIntoView({ behavior: 'smooth' });
        }

        function setRating(skillId, rating) {
            userRatings[skillId] = rating;
            document.querySelectorAll('#starRating .star').forEach((star, idx) => {
                star.classList.toggle('active', idx < rating);
            });
        }

        async function submitRating(skillId) {
            const rating = userRatings[skillId] || 0;
            const review = document.getElementById('reviewInput').value.trim();
            
            if (!rating) {
                alert('请先选择评分');
                return;
            }

            try {
                const res = await fetch('/api/ratings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skillId, rating, review, userId })
                });
                const data = await res.json();
                
                if (data.success) {
                    await loadSkillDetail(skillId);
                    renderSkills(currentCategory ? allSkills.filter(s => s.category === currentCategory) : allSkills);
                }
            } catch (e) {
                console.error('提交评分失败:', e);
            }
        }

        async function submitCase(skillId) {
            const title = document.getElementById('caseTitle').value.trim();
            const content = document.getElementById('caseContent').value.trim();
            
            if (!title || !content) {
                alert('请填写案例标题和内容');
                return;
            }

            try {
                const res = await fetch('/api/cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skillId, title, content, userId, userName: '用户' + userId.slice(-4) })
                });
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('caseTitle').value = '';
                    document.getElementById('caseContent').value = '';
                    await loadSkillDetail(skillId);
                }
            } catch (e) {
                console.error('提交案例失败:', e);
            }
        }

        async function likeCase(skillId, caseId) {
            try {
                const res = await fetch(`/api/cases/${skillId}/${caseId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const data = await res.json();
                
                if (data.success) {
                    const casesRes = await fetch(`/api/cases/${skillId}`);
                    const casesData = await casesRes.json();
                    document.getElementById('caseList').innerHTML = renderCases(casesData);
                }
            } catch (e) {
                console.error('点赞失败:', e);
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
        }

        // 收藏功能
        function loadFavoritesFromStorage() {
            try {
                const saved = localStorage.getItem('skillverse_favorites');
                if (saved) favorites = JSON.parse(saved);
            } catch (e) {}
            updateFavCount();
        }

        function saveFavoritesToStorage() {
            localStorage.setItem('skillverse_favorites', JSON.stringify(favorites));
            updateFavCount();
        }

        function updateFavCount() {
            document.getElementById('favCount').textContent = favorites.length;
        }

        function toggleFavorite(id) {
            const idx = favorites.indexOf(id);
            if (idx > -1) {
                favorites.splice(idx, 1);
            } else {
                favorites.push(id);
            }
            saveFavoritesToStorage();
            openSkill(id);
            renderSkills(currentCategory ? allSkills.filter(s => s.category === currentCategory) : allSkills);
        }

        function toggleFavorites() {
            const panel = document.getElementById('favoritesPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) {
                renderFavorites();
            }
        }

        function renderFavorites() {
            const container = document.getElementById('favoritesBody');
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-star"></i>
                        <div>还没有收藏任何技能</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = favorites.map(id => {
                const skill = allSkills.find(s => s.id === id);
                if (!skill) return '';
                const config = CATEGORY_CONFIG[skill.category] || { icon: '⭐', name: '其他' };
                return `
                    <div class="favorite-item" onclick="openSkill(${skill.id}); toggleFavorites();">
                        <div class="favorite-icon">${config.icon}</div>
                        <div class="favorite-info">
                            <div class="favorite-title">${skill.title}</div>
                            <div class="favorite-category">${config.name}</div>
                        </div>
                        <div class="favorite-remove" onclick="event.stopPropagation(); removeFavorite(${skill.id})">
                            <i class="fas fa-times"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function removeFavorite(id) {
            favorites = favorites.filter(f => f !== id);
            saveFavoritesToStorage();
            renderFavorites();
        }

        // 笔记功能
        async function saveNote(skillId) {
            const input = document.getElementById('noteInput');
            const content = input.value.trim();
            if (!content) return;

            try {
                const res = await fetch('/api/notes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skillId, content, userId })
